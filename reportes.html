<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reportes - Frutería Nenita</title>

    <link rel="stylesheet" href="styles.css">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<div class="navbar">

    📊 Reportes

    <button onclick="go('menu.html')">
        ← Volver
    </button>

</div>

<div class="container">

    <h1 class="mb-4">
        Reportes
    </h1>

    <!-- FECHAS -->

    <label>Fecha inicio</label>

    <input
        type="date"
        id="fechaInicio"
        class="form-control mb-3"
    >

    <label>Fecha fin</label>

    <input
        type="date"
        id="fechaFin"
        class="form-control mb-3"
    >

    <button
        onclick="generarReporte()"
        class="btn btn-success"
    >
        Generar Reporte
    </button>

    <hr class="my-4">

    <!-- RESULTADOS -->
    <div id="resultado"></div>

</div>

<script src="script.js"></script>

<script>

if(!localStorage.getItem("usuario")){

    window.location.href = "login.html";
}

if(!localStorage.getItem("usuario")){
    window.location.href = "login.html";
}

function cerrarSesion(){

    localStorage.removeItem("usuario");

    window.location.href = "login.html";

}

// =====================================
// GENERAR REPORTE
// =====================================

async function generarReporte(){

    const fechaInicio =
        document.getElementById(
            "fechaInicio"
        ).value;

    const fechaFin =
        document.getElementById(
            "fechaFin"
        ).value;

    if(
        fechaInicio === "" ||
        fechaFin === ""
    ){

        alert(
            "Selecciona ambas fechas"
        );

        return;

    }

    try {

        const response = await fetch(
            `http://localhost:3000/reportes/ventas?fechaInicio=${fechaInicio}&fechaFin=${fechaFin}`
        );

        const ventas = await response.json();

        const resultado =
            document.getElementById(
                "resultado"
            );

        resultado.innerHTML = "";

        // SIN DATOS

        if(ventas.length === 0){

            resultado.innerHTML = `
                <div class="alert">
                    No existen ventas
                    en ese rango de fechas.
                </div>
            `;

            return;

        }

        // TABLA
        let html = `
<table class="table table-bordered">

    <tr>
        <th>ID Venta</th>
        <th>Fecha</th>
        <th>Total</th>
    </tr>
`;

ventas.forEach(venta => {

    html += `
    <tr>

        <td>${venta.id_venta}</td>

        <td>
            ${new Date(venta.fecha).toLocaleString()}
        </td>

        <td>
            $${venta.total}
        </td>

    </tr>
    `;
});

html += `
</table>
`;

resultado.innerHTML = html;

    } catch(error){

        console.log(error);

        alert(
            "Error generando reporte"
        );

    }

}

</script>

</body>

</html>
