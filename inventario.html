<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inventario - Frutería Nenita</title>

    <link rel="stylesheet" href="styles.css">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<div class="navbar">

    📦 Inventario

    <button onclick="go('menu.html')">
        ← Volver
    </button>

</div>

<div class="container">

    <h1 class="mb-4">
        Control de Inventario
    </h1>

    <!-- PRODUCTO -->
    <select
        id="producto"
        class="form-control mb-3"
    ></select>

    <!-- TIPO -->
    <select
        id="tipo"
        class="form-control mb-3"
    >

        <option value="">
            Selecciona movimiento
        </option>

        <option value="Entrada">
            Entrada
        </option>

        <option value="Salida">
            Salida
        </option>

        <option value="Merma">
            Merma
        </option>

    </select>

    <!-- CANTIDAD -->
    <input
        type="number"
        id="cantidad"
        class="form-control mb-3"
        placeholder="Cantidad"
    >

    <!-- BOTON -->
    <button
        onclick="registrarMovimiento()"
        class="btn btn-success"
    >
        Registrar Movimiento
    </button>

    <hr class="my-4">

    <h2>
        Inventario Actual
    </h2>

    <div id="tablaInventario"></div>

</div>

<script src="script.js"></script>

<script>

if(!localStorage.getItem("usuario")){

    window.location.href = "login.html";

}

if(!localStorage.getItem("usuario")){
    window.location.href = "login.html";
}

function cerrarSesion(){

    localStorage.removeItem("usuario");

    window.location.href = "login.html";

}

// =====================================
// CARGAR PRODUCTOS
// =====================================

async function cargarProductos(){

    try {

        const response = await fetch(
            "http://localhost:3000/productos"
        );

        const productos = await response.json();

        const select =
            document.getElementById("producto");

        const tabla =
            document.getElementById(
                "tablaInventario"
            );

        // LIMPIAR SELECT

        select.innerHTML = `
            <option value="">
                Selecciona producto
            </option>
        `;

        // CREAR TABLA

        let html = `
            <table class="table table-bordered table-striped">

                <thead>

                    <tr>
                        <th>Producto</th>
                        <th>Stock</th>
                    </tr>

                </thead>

                <tbody>
        `;

        productos.forEach(producto => {

            // LLENAR SELECT

            select.innerHTML += `
                <option value="${producto.id_producto}">
                    ${producto.nombre}
                </option>
            `;

            // LLENAR TABLA

            html += `
                <tr>
                    <td>${producto.nombre}</td>
                    <td>${producto.stock}</td>
                </tr>
            `;

        });

        html += `
                </tbody>
            </table>
        `;

        tabla.innerHTML = html;

    } catch(error){

        console.log(error);

        alert(
            "Error cargando inventario"
        );

    }

}

// =====================================
// REGISTRAR MOVIMIENTO
// =====================================

async function registrarMovimiento(){

    const id_producto =
        document.getElementById("producto").value;

    const tipo =
        document.getElementById("tipo").value;

    const cantidad =
        parseFloat(
            document.getElementById(
                "cantidad"
            ).value
        );

    // VALIDACIONES

    if(id_producto === ""){

        alert(
            "Selecciona un producto"
        );

        return;

    }

    if(tipo === ""){

        alert(
            "Selecciona un tipo"
        );

        return;

    }

    if(
        isNaN(cantidad) ||
        cantidad <= 0
    ){

        alert(
            "Cantidad inválida"
        );

        return;

    }

    try {

        const response = await fetch(
            "http://localhost:3000/inventario",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify({

                    id_producto,
                    tipo,
                    cantidad

                })

            }
        );

        const data = await response.json();

        // VALIDAR RESPUESTA

        if(data.success){

            alert(
                "Inventario actualizado"
            );

            document.getElementById(
                "cantidad"
            ).value = "";

            cargarProductos();

        } else {

            alert(
                "No se pudo actualizar"
            );

        }

    } catch(error){

        console.log(error);

        alert(
            "Error del servidor"
        );

    }

}

// =====================================
// INICIAR
// =====================================

cargarProductos();

</script>

</body>

</html>
