<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ventas - Frutería Nenita</title>

    <link rel="stylesheet" href="styles.css">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<div class="navbar">

    🛒 Ventas

    <button onclick="go('menu.html')">
        ← Volver
    </button>

</div>

<div class="container">

    <h1>Registrar Venta</h1>

    <input
        id="busqueda"
        type="text"
        placeholder="Código o nombre del producto"
    >

    <input
        id="cantidad"
        type="number"
        placeholder="Cantidad"
    >

    <button onclick="agregarProducto()">
        Agregar
    </button>

    <div id="carrito" class="card p-3 mt-4"></div>

    <div class="card p-3 mt-4">
        <h2 id="total">
            Total: $0
        </h2>
    </div>

    <button
        class="btn btn-success mt-4"
        onclick="cobrar()"
    >
        Finalizar Venta
    </button>

</div>

<script src="script.js"></script>

<script>

if(!localStorage.getItem("usuario")){
    window.location.href = "login.html";
}

if(!localStorage.getItem("usuario")){
    window.location.href = "login.html";
}

function cerrarSesion(){

    localStorage.removeItem("usuario");

    window.location.href = "login.html";

}

let carrito = [];

async function agregarProducto(){

    const busqueda =
        document.getElementById("busqueda")
        .value
        .toLowerCase();

    const cantidad = parseFloat(
        document.getElementById("cantidad").value
    );

    if(busqueda === "" || cantidad <= 0){

        alert("Datos inválidos");

        return;
    }

    try {

        const response = await fetch(
            "http://localhost:3000/productos"
        );

        const productos = await response.json();

        const producto = productos.find(
            p =>
                p.codigo.toLowerCase() === busqueda ||
                p.nombre.toLowerCase() === busqueda
        );

        if(!producto){

            alert("Producto no encontrado");

            return;
        }

        if(producto.stock < cantidad){

            alert("Stock insuficiente");

            return;
        }

        carrito.push({
            ...producto,
            cantidad
        });

        mostrarCarrito();

    } catch(error){

        console.log(error);
    }
}

function mostrarCarrito(){

    const div = document.getElementById("carrito");

    div.innerHTML = "";

    let total = 0;

    carrito.forEach(p => {

        const subtotal = p.precio * p.cantidad;

        total += subtotal;

        div.innerHTML += `

            <div class="card p-3 mb-3">

                <h3>${p.nombre}</h3>

                <p>Cantidad: ${p.cantidad}</p>

                <p>Subtotal: $${subtotal}</p>

            </div>
        `;
    });

    document.getElementById("total")
        .innerText = `Total: $${total}`;
}

async function cobrar(){

    if(carrito.length === 0){

        alert("Carrito vacío");

        return;
    }

    try {

        await fetch(
            "http://localhost:3000/ventas",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify({
                    carrito
                })
            }
        );

        alert("Venta realizada correctamente");

        carrito = [];

        mostrarCarrito();

    } catch(error){

        console.log(error);
    }
}

</script>

</body>

</html>
