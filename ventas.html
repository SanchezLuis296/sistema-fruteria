<head>
    <title>Ventas - Frutería Nenita</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="navbar">
    🛒 Ventas

    <button onclick="go('menu.html')">
        ← Volver
    </button>
</div>

<div class="container">

    <h1>Registrar Venta</h1>

    <input id="codigo" type="text" placeholder="Código del producto">

    <input id="cantidad" type="number" placeholder="Cantidad">

    <button onclick="agregarProducto()">
    Agregar
    </button>

    <div id="carrito" class="card p-3"></div>

    <div class="card p-3">
        <h2 id="total">Total: $0</h2>
    </div>

<button onclick="cobrar()">
    Cobrar
</button>

</div>

<script src="script.js"></script>

<script>

if(!localStorage.getItem("usuario")){
    window.location.href = "login.html";
}

</script>

<script>

let carrito = [];

async function agregarProducto(){

    const codigo = document.getElementById("codigo").value;
    const cantidad = parseFloat(
        document.getElementById("cantidad").value
    );

    if(codigo === "" || cantidad <= 0){

        alert("Datos inválidos");
        return;
    }

    try {

        const response = await fetch(
            "http://localhost:3000/productos"
        );

        const productos = await response.json();

        const producto = productos.find(
            p => p.codigo === codigo
        );

        if(!producto){

            alert("Producto no encontrado");
            return;
        }

        if(producto.stock < cantidad){

            alert("Stock insuficiente");
            return;
        }

        carrito.push({
            ...producto,
            cantidad
        });

        mostrarCarrito();

    } catch(error){
        console.log(error);
    }
}

function mostrarCarrito(){

    const div = document.getElementById("carrito");

    div.innerHTML = "";

    let total = 0;

    carrito.forEach(p => {

        const subtotal = p.precio * p.cantidad;

        total += subtotal;

        div.innerHTML += `
            <p>
                ${p.nombre}
                x ${p.cantidad}
                = $${subtotal}
            </p>
        `;
    });

    document.getElementById("total").innerText =
        "Total: $" + total;
}

async function cobrar(){

    if(carrito.length === 0){

        alert("Carrito vacío");
        return;
    }

    try {

        await fetch("http://localhost:3000/ventas", {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                carrito
            })
        });

        alert("Venta realizada");

        carrito = [];

        mostrarCarrito();

    } catch(error){
        console.log(error);
    }
}

</script>

</body>
