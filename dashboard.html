<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="navbar">

    📈 Dashboard

    <button onclick="go('menu.html')">
        ← Volver
    </button>

</div>

<div class="container">

    <h1>Indicadores del Sistema</h1>

    <div class="card">

        <h2 id="totalProductos">
            Total productos: 0
        </h2>

        <h2 id="stockBajo">
            Productos con stock bajo: 0
        </h2>

    </div>

    <div class="card">

        <canvas id="graficaProductos"></canvas>

    </div>

</div>

<script src="script.js"></script>

<script>

async function cargarDashboard(){

    try {

        const response = await fetch(
            "http://localhost:3000/productos"
        );

        const productos = await response.json();

        document.getElementById("totalProductos")
            .innerText =
            "Total productos: " + productos.length;

        const bajos = productos.filter(
            p => p.stock < 10
        );

        document.getElementById("stockBajo")
            .innerText =
            "Productos con stock bajo: " + bajos.length;

        const nombres = productos.map(
            p => p.nombre
        );

        const stocks = productos.map(
            p => p.stock
        );

        new Chart(
            document.getElementById("graficaProductos"),
            {
                type: 'bar',

                data: {

                    labels: nombres,

                    datasets: [{

                        label: 'Stock',

                        data: stocks

                    }]
                }
            }
        );

    } catch(error){

        console.log(error);

        alert("Error dashboard");
    }
}

cargarDashboard();

if(!localStorage.getItem("usuario")){
    window.location.href = "login.html";
}

function cerrarSesion(){

    localStorage.removeItem("usuario");

    window.location.href = "login.html";

}

</script>

</body>

</html>
