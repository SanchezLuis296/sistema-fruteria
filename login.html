<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Frutería Nenita</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

    <!-- CONTENEDOR LOGIN -->
    <div class="login-container">

        <div class="login-box">

            <!-- LOGO -->
            <img
                src="fn.png"
                class="logo"
            >

            <!-- TITULO -->
            <div class="login-title">

                Bienvenido

            </div>

            <!-- INPUT USUARIO -->
            <input
                type="text"
                id="username"
                placeholder="Usuario"
            >

            <!-- INPUT PASSWORD -->
            <input
                type="password"
                id="password"
                placeholder="Contraseña"
            >

            <!-- BOTON LOGIN -->
            <button onclick="login()">

                Ingresar

            </button>

        </div>

    </div>

    <!-- SCRIPT GLOBAL -->
    <script src="script.js"></script>

    <!-- LOGIN -->
    <script>

        async function login() {

            // =========================
            // OBTENER DATOS
            // =========================

            const username =
                document.getElementById(
                    "username"
                ).value;

            const password =
                document.getElementById(
                    "password"
                ).value;

            // =========================
            // VALIDAR CAMPOS
            // =========================

            if(
                username === "" ||
                password === ""
            ){

                alert(
                    "Completa todos los campos"
                );

                return;
            }

            // =========================
            // LOGIN
            // =========================

            try {

                const response = await fetch(
                    "http://localhost:3000/login",
                    {

                        method: "POST",

                        headers: {

                            "Content-Type":
                                "application/json"
                        },

                        body: JSON.stringify({

                            username,
                            password
                        })
                    }
                );

                const data =
                    await response.json();

                // =========================
                // LOGIN EXITOSO
                // =========================

                if(data.success){

                    // GUARDAR USUARIO

                    localStorage.setItem(

                        "usuario",

                        JSON.stringify(
                            data.usuario
                        )
                    );

                    // REDIRECCION POR ROL

                    if(
                        data.usuario.rol ===
                        "Administrador"
                    ){

                        window.location.href =
                            "menu.html";

                    } else {

                        window.location.href =
                            "ventas.html";

                    }

                } else {

                    alert(
                        "Usuario o contraseña incorrectos"
                    );
                }

            } catch(error){

                console.log(error);

                alert(
                    "Error del servidor"
                );
            }
        }

    </script>

</body>

</html>
