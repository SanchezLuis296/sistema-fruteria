<head>
    <title>Login - Frutería Nenita</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <img src="fn.png" class="logo">

        <div class="login-title">
            Bienvenido
        </div>

        <input
            type="text"
            id="username"
            placeholder="Usuario"
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <button onclick="login()">
            Ingresar
        </button>

        <div class="alert">
            🍎 Sistema sencillo y rápido para empleados.
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
